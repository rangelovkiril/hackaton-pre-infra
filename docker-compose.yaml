x-defaults: &defaults
  restart: unless-stopped
  networks: [internal]
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

networks:
  internal:

services:
  backend:
    <<: *defaults
    image: ghcr.io/rangelovkiril/hacktues12-backend:latest
    ports:
      - "3000:3000"
    depends_on:
      mosquitto:
        condition: service_healthy

  frontend:
    <<: *defaults
    image: ghcr.io/rangelovkiril/hacktues12-frontend:latest
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy

  mosquitto:
    <<: *defaults
    image: eclipse-mosquitto:2.0.20
    container_name: mosquitto
    command: >
      sh -c 'printf "listener 1883\nallow_anonymous true\npersistence true\npersistence_location /mosquitto/data/\nlog_dest stdout\n"
      > /mosquitto/config/mosquitto.conf &&
      exec mosquitto -c /mosquitto/config/mosquitto.conf'
    expose:
      - "1883"
    volumes:
      - mosquitto-data:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1883 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mosquitto-data: